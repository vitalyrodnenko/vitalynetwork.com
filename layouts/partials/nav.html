<nav class="nav">
    <div class="container nav-inner">
        <a href="{{ .Site.BaseURL }}" class="nav-logo">
            {{ .Site.Title }}
            <span>{{ .Site.Params.tagline }}</span>
        </a>
        <div class="nav-links">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent " main" . }} active{{ end }}">{{ .Name }}</a>
            {{ end }}
            <a href="{{ .Site.Params.calendly }}" target="_blank" class="nav-link nav-cta">Book a Sync <span
                    class="arrow">↗</span></a>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">◑</button>
        </div>
    </div>
</nav>
